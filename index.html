<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <title>猎奇回战乐子榜</title>
</head>
<body>
  <main id="app">
    <h1 id="rainbow-title" aria-hidden="true">猎奇回战乐子榜</h1>

    <section class="leaderboard" role="list" aria-label="榜单">
      <div class="entry" role="listitem" tabindex="0" data-name="冰忌（3028930771）" data-img="bj.png" data-accusation-img="bjzm.png" data-epilogue-img="bjws.png" aria-label="第一名 冰忌（3028930771）">
        <div class="rank" aria-hidden="true"><span class="num">1</span></div>
        <img src="bj.png" alt="冰忌 头像" class="avatar" />
        <div class="meta">
          <div class="name">冰忌（3028930771）</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Right-side decorative image -->
  <div class="side-image" aria-hidden="true">
    <img src="nb.png" alt="" />
  </div>

  <!-- Modal for entry details -->
  <div id="detail-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-sheet modal-sheet-wide" role="document">
      <button class="close-btn" id="close-detail" aria-label="关闭">✕</button>
      <div class="detail-layout">
        <header class="detail-header">
          <img src="bj.png" alt="冰忌 头像" class="detail-avatar"/>
          <div class="detail-header-text">
            <div class="detail-name">冰忌（3028930771）</div>
            <div class="detail-meta">事件开始时间：2026年4月1日</div>
          </div>
        </header>

        <section class="detail-main">
          <div class="section-title">罪行：乐子行为 无脑乱喷 嫉妒大罪</div>
          <div class="crime-images">
            <img src="bjzm.png" alt="冰忌 罪行 1" class="crime-thumb" tabindex="0" data-original="bjzm.png" />
            <img src="bj1.png" alt="冰忌 罪行 2" class="crime-thumb" tabindex="0" data-original="bj1.png" />
            <img src="bj2.png" alt="冰忌 罪行 3" class="crime-thumb" tabindex="0" data-original="bj2.png" />
            <img src="bj3.png" alt="冰忌 罪行 4" class="crime-thumb" tabindex="0" data-original="bj3.png" />
            <img src="bj4.png" alt="冰忌 罪行 5" class="crime-thumb" tabindex="0" data-original="bj4.png" />
            <img src="bj5.png" alt="冰忌 罪行 6" class="crime-thumb" tabindex="0" data-original="bj5.png" />
            <img src="bj6.png" alt="冰忌 罪行 7" class="crime-thumb" tabindex="0" data-original="bj6.png" />
            <img src="bj7.png" alt="冰忌 罪行 8" class="crime-thumb" tabindex="0" data-original="bj7.png" />
            <img src="bj8.png" alt="冰忌 罪行 9" class="crime-thumb" tabindex="0" data-original="bj8.png" />
            <img src="bj9.png" alt="冰忌 罪行 10" class="crime-thumb" tabindex="0" data-original="bj9.png" />
            <img src="bj10.png" alt="冰忌 罪行 11" class="crime-thumb" tabindex="0" data-original="bj10.png" />
            <img src="bj11.png" alt="冰忌 罪行 12" class="crime-thumb" tabindex="0" data-original="bj11.png" />
            <img src="bj12.png" alt="冰忌 罪行 13" class="crime-thumb" tabindex="0" data-original="bj12.png" />
            <img src="bj13.png" alt="冰忌 罪行 14" class="crime-thumb" tabindex="0" data-original="bj13.png" />
            <img src="bj14.png" alt="冰忌 罪行 15" class="crime-thumb" tabindex="0" data-original="bj14.png" />
            <img src="bj15.png" alt="冰忌 罪行 16" class="crime-thumb" tabindex="0" data-original="bj15.png" />
            <img src="bj16.png" alt="冰忌 罪行 17" class="crime-thumb" tabindex="0" data-original="bj16.png" />
            <img src="bj17.png" alt="冰忌 罪行 18" class="crime-thumb" tabindex="0" data-original="bj17.png" />
            <img src="bj18.png" alt="冰忌 罪行 19" class="crime-thumb" tabindex="0" data-original="bj18.png" />
            <img src="bj19.png" alt="冰忌 罪行 20" class="crime-thumb" tabindex="0" data-original="bj19.png" />
            <img src="bj20.png" alt="冰忌 罪行 21" class="crime-thumb" tabindex="0" data-original="bj20.png" />
            <img src="bj21.png" alt="冰忌 罪行 22" class="crime-thumb" tabindex="0" data-original="bj21.png" />
          </div>

          <div class="subsection">
            <div class="section-subtitle" style="font-weight:800;color:var(--accent2);margin-top:8px;margin-bottom:8px;">默纳罗斯发言</div>
            <div class="crime-images">
              <img src="bjgj1.png" alt="默纳罗斯 发言 1" class="crime-thumb" tabindex="0" data-original="bjgj1.png" />
              <img src="bjgj2.png" alt="默纳罗斯 发言 2" class="crime-thumb" tabindex="0" data-original="bjgj2.png" />
              <img src="bjgj3.png" alt="默纳罗斯 发言 3" class="crime-thumb" tabindex="0" data-original="bjgj3.png" />
            </div>
          </div>

          <div class="subsection">
            <div class="section-subtitle" style="font-weight:800;color:var(--accent2);margin-top:8px;margin-bottom:8px;">城黎奚落发言</div>
            <div class="crime-images">
              <img src="bjcl1.png" alt="城黎奚落 发言 1" class="crime-thumb" tabindex="0" data-original="bjcl1.png" />
            </div>
          </div>

          <div class="status status-line">现状态：已道歉</div>
        </section>
      </div>
    </div>
  </div>

  <!-- Lightbox for enlarged accusation image -->
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="lightbox-inner">
      <button class="close-btn" id="close-lightbox" aria-label="关闭">✕</button>
      <div class="lightbox-image-wrap">
        <img id="lightbox-img" src="" alt="放大图" />
      </div>
      <div class="viewer-toolbar" aria-hidden="false">
        <div class="toolbar-left">
          <button id="zoom-out" class="zoom-btn" aria-label="缩小">−</button>
          <button id="zoom-in" class="zoom-btn" aria-label="放大">＋</button>
          <button id="fit-btn" class="viewer-btn" aria-label="适应屏幕">适应屏幕</button>
          <button id="actual-btn" class="viewer-btn" aria-label="实际大小">100%</button>
          <button id="rotate-left" class="viewer-btn" aria-label="向左旋转">↺</button>
          <button id="rotate-right" class="viewer-btn" aria-label="向右旋转">↻</button>
        </div>
        <div class="toolbar-right">
          <span id="zoom-indicator" class="zoom-indicator">100%</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <input id="zoom-input" class="zoom-input" type="number" min="10" max="2000" step="1" value="100" aria-label="缩放百分比输入"/> 
            <span style="font-size:12px;color:var(--muted-2)">%</span>
          </div>
          <a id="open-original" class="viewer-link" href="#" target="_blank" rel="noopener noreferrer">打开原图</a>
          <a id="download-image" class="viewer-link" href="#" download>下载</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
