<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <title>猎奇回战乐子榜</title>
</head>
<body>
  <main id="app">
    <h1 id="rainbow-title" aria-hidden="true">猎奇回战乐子榜</h1>

    <section class="leaderboard" role="list" aria-label="榜单">
      <div class="entry" role="listitem" tabindex="0" data-name="冰忌（3028930771）" data-img="bj.png" data-accusation-img="bjzm.png" data-tq-img="bjtq.jpg" data-epilogue-img="bjws.png" aria-label="第一名 冰忌（3028930771）">
        <div class="rank" aria-hidden="true"><span class="num">1</span></div>
        <img src="bj.png" alt="冰忌 头像" class="avatar" />
        <div class="meta">
          <div class="name">冰忌（3028930771）</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Right-side decorative image -->
  <div class="side-image" aria-hidden="true">
    <img src="nb.png" alt="" />
  </div>

  <!-- Modal for entry details -->
  <div id="detail-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-sheet" role="document">
      <button class="close-btn" id="close-detail" aria-label="关闭">✕</button>
      <div class="detail-content">
        <img id="detail-avatar" src="" alt="" class="detail-avatar"/>
        <div class="detail-name" id="detail-name"></div>

        <div class="status" id="detail-status" style="color:var(--muted);font-weight:600;">现状态：</div>

        <div class="accusation">
          <div class="accusation-label">罪名：</div>
          <img id="accusation-thumb" src="" alt="罪名预览" class="accusation-thumb" tabindex="0" />
        </div>

        <div class="tq-image" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px;">
          <img id="additional-img" src="" alt="补充图片" class="accusation-thumb" tabindex="0" style="width:160px;height:100px;object-fit:cover;border-radius:8px;" />
          <div class="epilogue" style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;">
            <div class="accusation-label" style="font-weight:700">尾声：</div>
            <img id="epilogue-img" src="" alt="尾声 预览" class="accusation-thumb" tabindex="0" style="width:160px;height:100px;object-fit:cover;border-radius:8px;" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox for enlarged accusation image -->
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="lightbox-inner">
      <button class="close-btn" id="close-lightbox" aria-label="关闭">✕</button>
      <div class="lightbox-image-wrap">
        <img id="lightbox-img" src="" alt="放大图" />
      </div>
      <div class="viewer-toolbar" aria-hidden="false">
        <div class="toolbar-left">
          <button id="zoom-out" class="zoom-btn" aria-label="缩小">−</button>
          <button id="zoom-in" class="zoom-btn" aria-label="放大">＋</button>
          <button id="fit-btn" class="viewer-btn" aria-label="适应屏幕">适应屏幕</button>
          <button id="actual-btn" class="viewer-btn" aria-label="实际大小">100%</button>
          <button id="rotate-left" class="viewer-btn" aria-label="向左旋转">↺</button>
          <button id="rotate-right" class="viewer-btn" aria-label="向右旋转">↻</button>
        </div>
        <div class="toolbar-right">
          <span id="zoom-indicator" class="zoom-indicator">100%</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <input id="zoom-input" class="zoom-input" type="number" min="10" max="2000" step="1" value="100" aria-label="缩放百分比输入"/> 
            <span style="font-size:12px;color:var(--muted-2)">%</span>
          </div>
          <a id="open-original" class="viewer-link" href="#" target="_blank" rel="noopener noreferrer">打开原图</a>
          <a id="download-image" class="viewer-link" href="#" download>下载</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
